# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g default-shell "/usr/bin/zsh"
set -g default-command "/usr/bin/zsh"

# Status bar
set -g status-position top
set -g status-style bg=default,fg=white
set -g status-justify left
set -g status-interval 1
set -g status-left "#[fg=cyan,bold] 󰊪  #[fg=white]│ "
set -g status-left-length 30
set -g status-right "#[fg=cyan,bold]󰃭 %b %d #[fg=brightblack]│ #[fg=cyan,bold]󰥔 %H:%M "
set -g status-right-length 60
setw -g window-status-separator " | "
setw -g window-status-format "#[fg=brightblack]#I #[fg=white]#W#[fg=yellow]#{?window_zoomed_flag, 󰊓,}"
setw -g window-status-current-format "#[fg=cyan,bold]#I #[fg=cyan]#W#[fg=yellow]#{?window_zoomed_flag, 󰊓,}"

# Window and pane behavior
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_command}'
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=cyan,bold
set -g display-panes-time 2000

# QoL
set -g mouse on
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on
setw -g aggressive-resize on
setw -g mode-keys vi

# Key bindings
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5
bind c new-window -c "#{pane_current_path}"
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle

# TPM + plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
run "~/.tmux/plugins/tpm/tpm"
